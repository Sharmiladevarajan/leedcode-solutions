name: Sync LeetCode Solutions
permissions:
  contents: write
on:
  schedule:
    - cron: '0 3 * * *'  # Daily at 3 AM UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install LeetCode CLI
        run: npm install -g leetcode-cli

      - name: Export Solutions
        env:
          LEETCODE_SESSION: ${{ secrets.eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..HESUsmXNMhCV4f6ZJlFwQnqKtffF5gHdEJ50HQ75g14 }}
        run: |
          mkdir raw_solutions
          leetcode export -o raw_solutions

      - name: Organize by Difficulty
        run: |
          mkdir -p Easy Medium Hard
          
          for file in raw_solutions/*; do
            if grep -q "Easy" "$file"; then
              mv "$file" Easy/
            elif grep -q "Medium" "$file"; then
              mv "$file" Medium/
            elif grep -q "Hard" "$file"; then
              mv "$file" Hard/
            fi
          done
          
          rm -rf raw_solutions

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Auto-update LeetCode solutions" || echo "No changes"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git